<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tennis App</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
  margin: 0;
}

/* Karten */
.card {
  background: #1e293b;
  padding: 20px;
  margin: 10px;
  border-radius: 15px;
}

/* Buttons (iPhone Fix!) */
button {
  padding: 18px;
  margin: 10px;
  font-size: 18px;
  border-radius: 12px;

  border: none;
  color: white;

  background: #334155;

  appearance: none;
  -webkit-appearance: none;
}

/* Farben */
.teamA {
  background: #16a34a !important;
}

.teamB {
  background: #2563eb !important;
}

.reset {
  background: #dc2626 !important;
}

/* Eingabefelder */
input {
  padding: 10px;
  margin: 6px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

/* verstecken */
.hidden {
  display: none;
}
</style>
</head>

<body>

<h1>🎾 Tennis Score</h1>

<!-- Setup -->
<div id="setup" class="card">
  <h2>Spiel auswählen</h2>

  <button onclick="setMode('single')">Einzel</button>
  <button onclick="setMode('double')">Doppel</button>

  <div id="playerInputs"></div>

  <button onclick="startGame()">Start</button>
</div>

<!-- Game -->
<div id="game" class="hidden">

<div class="card">
  <h2 id="sets"></h2>
  <h2 id="games"></h2>
  <h3 id="server"></h3>
  <h1 id="score"></h1>
</div>

<button class="teamA" onclick="point(0)">Team A</button>
<button class="teamB" onclick="point(1)">Team B</button>

<br>
<button class="reset" onclick="reset()">Reset</button>

</div>

<script>
let mode = "single";
let players = [];

let points=[0,0];
let games=[0,0];
let sets=[0,0];

let tiebreak=false;
let server=0;

// Spielmodus wählen
function setMode(m){
  mode = m;
  let html = "";

  if(m==="single"){
    html += `<input id="p0" placeholder="Spieler 1">
             <input id="p1" placeholder="Spieler 2">`;
  } else {
    html += `<input id="p0" placeholder="A1">
             <input id="p1" placeholder="A2">
             <input id="p2" placeholder="B1">
             <input id="p3" placeholder="B2">`;
  }

  document.getElementById("playerInputs").innerHTML = html;
}

// Spiel starten
function startGame(){
  if(mode==="single"){
    players = [
      document.getElementById("p0").value || "Spieler 1",
      document.getElementById("p1").value || "Spieler 2"
    ];
  } else {
    players = [
      document.getElementById("p0").value || "A1",
      document.getElementById("p1").value || "A2",
      document.getElementById("p2").value || "B1",
      document.getElementById("p3").value || "B2"
    ];
  }

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  render();
}

// Anzeige aktualisieren
function render(){
  document.getElementById("sets").innerText = "Satz: " + sets[0] + " : " + sets[1];
  document.getElementById("games").innerText = "Spiele: " + games[0] + " : " + games[1];

  let serverName = players[server] || "Spieler";
  document.getElementById("server").innerText = "Aufschlag: " + serverName;

  let scoreNames = ["0","15","30","40"];
  let score = "";

  if(tiebreak){
    score = points[0] + " : " + points[1] + " (TB)";
  }
  else if(points[0]>=3 && points[1]>=3){
    if(points[0]===points[1]) score="Einstand";
    else score = points[0]>points[1] ? "Vorteil A" : "Vorteil B";
  }
  else{
    score = scoreNames[points[0]] + " : " + scoreNames[points[1]];
  }

  document.getElementById("score").innerText = score;
}

// Punkt
function point(team){
  points[team]++;

  if(tiebreak){
    if(points[team]>=7 && points[team]-points[1-team]>=2){
      winGame(team);
    }
  } else {
    if(points[team]>=4 && points[team]-points[1-team]>=2){
      winGame(team);
    }
  }

  render();
}

// Spielgewinn
function winGame(team){
  games[team]++;
  points=[0,0];

  server = (server + 1) % (mode==="single" ? 2 : 4);

  if(games[team]>=6 && games[team]-games[1-team]>=2){
    sets[team]++;
    games=[0,0];
  }

  if(sets[team]===2){
    alert("🏆 Match gewonnen Team " + (team===0?"A":"B"));
    reset();
    return;
  }

  if(games[0]===6 && games[1]===6){
    tiebreak=true;
  } else {
    tiebreak=false;
  }
}

// Reset
function reset(){
  location.reload();
}

// Start
setMode("single");
</script>

</body>
</html>
