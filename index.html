<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tennis App</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
  margin: 0;
}

.card {
  background: #1e293b;
  padding: 20px;
  margin: 10px;
  border-radius: 15px;
}

button {
  padding: 18px;
  margin: 10px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  color: white;
  background: #334155;
  appearance: none;
  -webkit-appearance: none;
}

.teamA { background: #16a34a !important; }
.teamB { background: #2563eb !important; }
.reset { background: #dc2626 !important; }
.undo  { background: #f59e0b !important; }

input {
  padding: 10px;
  margin: 6px;
  border-radius: 8px;
  border: none;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<h1>🎾 Tennis Score</h1>

<!-- Setup -->
<div id="setup" class="card">
  <h2>Spiel auswählen</h2>

  <button onclick="setMode('single')">Einzel</button>
  <button onclick="setMode('double')">Doppel</button>

  <div id="playerInputs"></div>

  <button onclick="startGame()">Start</button>
</div>

<!-- Spiel -->
<div id="game" class="hidden">

<div class="card">
  <h2 id="sets"></h2>
  <h2 id="games"></h2>
  <h3 id="server"></h3>
  <h1 id="score"></h1>
</div>

<!-- Spieler Buttons -->
<div id="buttons"></div>

<button class="undo" onclick="undo()">↩️ Rückgängig</button>
<br>
<button class="reset" onclick="reset()">Reset</button>

</div>

<script>
let mode="single";
let players=[];
let history=[];

let state={
  points:[0,0],
  games:[0,0],
  sets:[0,0],
  tiebreak:false,
  server:0
};

function cloneState(){
  return JSON.parse(JSON.stringify(state));
}

function saveHistory(){
  history.unshift(cloneState());
  if(history.length>20) history.pop();
}

function setMode(m){
  mode=m;
  let html="";

  if(m==="single"){
    html+=`<input id="p0" placeholder="Spieler 1">
           <input id="p1" placeholder="Spieler 2">`;
  } else {
    html+=`<input id="p0" placeholder="A1">
           <input id="p1" placeholder="A2">
           <input id="p2" placeholder="B1">
           <input id="p3" placeholder="B2">`;
  }

  document.getElementById("playerInputs").innerHTML=html;
}

function startGame(){
  if(mode==="single"){
    players=[
      document.getElementById("p0").value||"Spieler 1",
      document.getElementById("p1").value||"Spieler 2"
    ];
  } else {
    players=[
      document.getElementById("p0").value||"A1",
      document.getElementById("p1").value||"A2",
      document.getElementById("p2").value||"B1",
      document.getElementById("p3").value||"B2"
    ];
  }

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  renderButtons();
  render();
}

function renderButtons(){
  let html="";

  if(mode==="single"){
    html+=`<button class="teamA" onclick="point(0)">${players[0]}</button>`;
    html+=`<button class="teamB" onclick="point(1)">${players[1]}</button>`;
  } else {
    html+=`<button class="teamA" onclick="point(0)">${players[0]} / ${players[1]}</button>`;
    html+=`<button class="teamB" onclick="point(1)">${players[2]} / ${players[3]}</button>`;
  }

  document.getElementById("buttons").innerHTML=html;
}

function render(){
  document.getElementById("sets").innerText=`Satz: ${state.sets[0]} : ${state.sets[1]}`;
  document.getElementById("games").innerText=`Spiele: ${state.games[0]} : ${state.games[1]}`;

  let serverName=players[state.server%players.length];
  document.getElementById("server").innerText="Aufschlag: "+serverName;

  let s=["0","15","30","40"];
  let score="";

  if(state.tiebreak){
    score=`${state.points[0]} : ${state.points[1]} (TB)`;
  } else if(state.points[0]>=3 && state.points[1]>=3){
    if(state.points[0]===state.points[1]) score="Einstand";
    else score=state.points[0]>state.points[1]?"Vorteil A":"Vorteil B";
  } else {
    score=`${s[state.points[0]]} : ${s[state.points[1]]}`;
  }

  document.getElementById("score").innerText=score;
}

function point(t){
  saveHistory();
  state.points[t]++;

  if(state.tiebreak){
    if(state.points[t]>=7 && state.points[t]-state.points[1-t]>=2){
      winGame(t);
    }
  } else {
    if(state.points[t]>=4 && state.points[t]-state.points[1-t]>=2){
      winGame(t);
    }
  }

  render();
}

function winGame(t){
  state.games[t]++;
  state.points=[0,0];
  state.server++;

  if(state.games[t]>=6 && state.games[t]-state.games[1-t]>=2){
    state.sets[t]++;
    state.games=[0,0];
  }

  if(state.sets[t]===2){
    alert("🏆 Match gewonnen!");
    reset();
    return;
  }

  state.tiebreak=(state.games[0]===6 && state.games[1]===6);
}

function undo(){
  if(history.length===0) return;
  state=history.shift();
  render();
}

function reset(){
  location.reload();
}

setMode("single");
</script>

</body>
</html>
