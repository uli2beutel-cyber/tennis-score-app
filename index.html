<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tennis App</title>

<style>

/* ✅ Reset gegen weiße Ränder */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow-x: hidden;
  font-family: Arial;
  color: white;
  text-align: center;

  /* Fallback-Hintergrund */
  background: #000;
}

/* ✅ Startscreen Vollbild */
#setup {
  position: relative;
  height: 100vh;
  width: 100vw;

  background-image: url('maurits-bausenhart-XtcZbSPVJ3A-unsplash.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* ✅ dunkles Overlay */
#setup::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
}

/* ✅ Titel sauber im Bild */
.title {
  position: relative;
  z-index: 1;
  margin: 0;
  padding: 30px 10px 15px;
  font-size: 34px;
  font-weight: bold;
  letter-spacing: 1px;
  text-shadow: 0 3px 12px rgba(0,0,0,0.9);
}

/* ✅ Zentrierter Inhalt */
#setup .card {
  position: relative;
  z-index: 1;
  margin: 20px auto;
  max-width: 420px;
}

/* Spielscreen */
#game {
  min-height: 100vh;
  background: #0f172a;
}

/* UI */
.card {
  background: rgba(30, 41, 59, 0.92);
  padding: 20px;
  border-radius: 15px;
}

button {
  padding: 18px;
  margin: 10px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  color: white;
  background: #334155;
}

.teamA { background: #16a34a !important; }
.teamB { background: #2563eb !important; }
.reset { background: #dc2626 !important; }
.undo { background: #f59e0b !important; margin-top: 40px; }

input, select {
  padding: 10px;
  margin: 6px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

.hidden { display: none; }

</style>
</head>

<body>

<div id="setup">

  <h1 class="title">🎾 Tennis Score</h1>

  <div class="card">

    <h2>Spiel auswählen</h2>
    <button onclick="setMode('single')">Einzel</button>
    <button onclick="setMode('double')">Doppel</button>

    <div id="playerInputs"></div>

    <h3>Wer hat Aufschlag?</h3>
    <select id="serverSelect"></select>

    <h3>Modus</h3>
    <select id="countMode">
      <option value="normal">Freies Spiel</option>
      <option value="medenspiel">Medenspiel (DTB)</option>
    </select>

    <button onclick="startGame()">Start</button>
  </div>
</div>

<div id="game" class="hidden">
  <div class="card">
    <h2 id="sets"></h2>
    <h2 id="games"></h2>
    <h3 id="server"></h3>
    <h1 id="score"></h1>
  </div>

  <div id="buttons"></div>

  <button class="undo" onclick="undo()">↩️ Rückgängig</button>
  <br>
  <button class="reset" onclick="reset()">Reset</button>
</div>

<script>

let mode="single";
let players=[];
let history=[];

let maxSets = 2;
let matchTiebreak = false;

let state={
  points:[0,0],
  games:[0,0],
  sets:[0,0],
  tiebreak:false,
  server:0
};

function cloneState(){ return JSON.parse(JSON.stringify(state)); }
function saveHistory(){ history.unshift(cloneState()); if(history.length>20) history.pop(); }

function setMode(m){
  mode=m;
  let html="";
  if(m==="single"){
    html=`<input id="p0" placeholder="Spieler 1"><input id="p1" placeholder="Spieler 2">`;
  } else {
    html=`<input id="p0" placeholder="A1"><input id="p1" placeholder="A2">
          <input id="p2" placeholder="B1"><input id="p3" placeholder="B2">`;
  }
  document.getElementById("playerInputs").innerHTML=html;
  updateServerOptions();
}

function updateServerOptions(){
  let select=document.getElementById("serverSelect");
  select.innerHTML="";
  let count = (mode==="single") ? 2 : 4;
  for(let i=0;i<count;i++){
    let opt=document.createElement("option");
    opt.value=i;
    opt.text="Spieler " + (i+1);
    select.appendChild(opt);
  }
}

function startGame(){

  if(mode==="single"){
    players=[
      document.getElementById("p0").value||"Spieler 1",
      document.getElementById("p1").value||"Spieler 2"
    ];
  } else {
    players=[
      document.getElementById("p0").value||"A1",
      document.getElementById("p1").value||"A2",
      document.getElementById("p2").value||"B1",
      document.getElementById("p3").value||"B2"
    ];
  }

  state.server=parseInt(document.getElementById("serverSelect").value);

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  renderButtons();
  render();
}

function getTeamName(team){
  if(mode === "single"){
    return players[team];
  } else {
    return team === 0
      ? players[0] + " / " + players[1]
      : players[2] + " / " + players[3];
  }
}

function renderButtons(){
  let html="";
  html+=`<button class="teamA" onclick="point(0)">${getTeamName(0)}</button>`;
  html+=`<button class="teamB" onclick="point(1)">${getTeamName(1)}</button>`;
  document.getElementById("buttons").innerHTML=html;
}

function render(){
  document.getElementById("sets").innerText=`Satz: ${state.sets[0]} : ${state.sets[1]}`;
  document.getElementById("games").innerText=`Spiele: ${state.games[0]} : ${state.games[1]}`;

  let serverName = players[state.server % players.length];
  document.getElementById("server").innerText="Aufschlag: " + serverName;

  let s=["0","15","30","40"];
  let score="";

  if(state.tiebreak){
    score = `${state.points[0]} : ${state.points[1]} ${(matchTiebreak ? '(Match-TB)' : '(TB)')}`;
  }
  else if(state.points[0]>=3 && state.points[1]>=3){
    if(state.points[0]===state.points[1]) score="Einstand";
    else score=state.points[0]>state.points[1]
      ? "Vorteil " + getTeamName(0)
      : "Vorteil " + getTeamName(1);
  }
  else{
    score=`${s[state.points[0]]} : ${s[state.points[1]]}`;
  }

  document.getElementById("score").innerText=score;
}

function point(t){
  saveHistory();
  state.points[t]++;

  if(state.tiebreak){
    let limit = matchTiebreak ? 10 : 7;

    if(state.points[t] >= limit && state.points[t]-state.points[1-t] >= 2){
      winGame(t);
    }
  } else {
    if(state.points[t]>=4 && state.points[t]-state.points[1-t]>=2){
      winGame(t);
    }
  }

  render();
}

function winGame(t){

  if(matchTiebreak){
    alert("🏆 Match gewonnen! " + getTeamName(t));
    reset();
    return;
  }

  state.games[t]++;
  state.points=[0,0];
  state.server++;

  if(state.games[t]>=6 && state.games[t]-state.games[1-t]>=2){
    state.sets[t]++;
    state.games=[0,0];

    if(state.sets[0]===1 && state.sets[1]===1){
      matchTiebreak = true;
      state.tiebreak = true;
      state.points=[0,0];
      return;
    }
  }

  if(state.sets[t] === maxSets){
    alert("🏆 Match gewonnen! " + getTeamName(t));
    reset();
    return;
  }

  state.tiebreak=(state.games[0]===6 && state.games[1]===6);
}

function undo(){
  if(history.length===0) return;
  state=history.shift();
  render();
}

function reset(){
  location.reload();
}

setMode("single");

</script>

</body>
</html>
``
