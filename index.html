<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tennis App</title>

<style>

/* RESET */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial;
  color: white;
  text-align: center;
  background: #000;
}

/* STARTSCREEN */
#setup {
  height: 100vh;
  width: 100vw;
  background-image: url('maurits-bausenhart-XtcZbSPVJ3A-unsplash.jpg');
  background-size: cover;
  background-position: center;
  position: relative;
}

#setup::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

.title {
  position: relative;
  z-index: 1;
  margin: 0;
  padding: 30px 10px;
  font-size: 34px;
  font-weight: bold;
  text-shadow: 0 4px 12px rgba(0,0,0,0.9);
}

.card {
  position: relative;
  z-index: 1;
  max-width: 420px;
  margin: 20px auto;
  background: rgba(30,41,59,0.9);
  padding: 20px;
  border-radius: 20px;
}

#game {
  min-height: 100vh;
  background: #0f172a;
}

/* MODERNE BUTTONS */
button {
  padding: 18px;
  margin: 8px;
  font-size: 18px;
  border-radius: 20px;
  border: none;
  color: white;
  cursor: pointer;
  transition: all 0.15s ease;
}

button:active {
  transform: scale(0.96);
}

/* Team Buttons */
.teamA {
  background: linear-gradient(135deg, #22c55e, #15803d);
}

.teamB {
  background: linear-gradient(135deg, #3b82f6, #1d4ed8);
}

/* Action Buttons */
.undo {
  background: linear-gradient(135deg, #f59e0b, #b45309);
  margin-top: 40px;
}

.reset {
  background: linear-gradient(135deg, #ef4444, #991b1b);
}

input, select {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

.hidden { display: none; }

</style>
</head>

<body>

<div id="setup">

  <h1 class="title">🎾 Tennis Score</h1>

  <div class="card">
    <button onclick="setMode('single')">Einzel</button>
    <button onclick="setMode('double')">Doppel</button>

    <div id="playerInputs"></div>

    <h3>Aufschlag</h3>
    <select id="serverSelect"></select>

    <button onclick="startGame()">Start</button>
  </div>
</div>

<div id="game" class="hidden">

  <div class="card">
    <h2 id="setHistory"></h2>
    <h2 id="games"></h2>
    <h3 id="server"></h3>
    <h1 id="score"></h1>
  </div>

  <div id="buttons"></div>

  <button class="undo" onclick="undo()">↩️ Rückgängig</button><br>
  <button class="reset" onclick="reset()">Reset</button>

</div>

<script>

let mode="single";
let players=[];
let history=[];
let matchTiebreak=false;

let setHistory=[];

let state={
  points:[0,0],
  games:[0,0],
  sets:[0,0],
  tiebreak:false,
  server:0
};

function cloneState(){ return JSON.parse(JSON.stringify({state, matchTiebreak, setHistory})); }
function restoreState(s){
  state=s.state;
  matchTiebreak=s.matchTiebreak;
  setHistory=s.setHistory;
}

function saveHistory(){
  history.unshift(cloneState());
  if(history.length>20) history.pop();
}

function setMode(m){
  mode=m;
  let html="";
  if(m==="single"){
    html=`<input id="p0" placeholder="Spieler 1">
          <input id="p1" placeholder="Spieler 2">`;
  } else {
    html=`<input id="p0" placeholder="A1">
          <input id="p1" placeholder="A2">
          <input id="p2" placeholder="B1">
          <input id="p3" placeholder="B2">`;
  }
  document.getElementById("playerInputs").innerHTML=html;
  updateServerOptions();
}

function updateServerOptions(){
  let select=document.getElementById("serverSelect");
  select.innerHTML="";
  let count=(mode==="single")?2:4;
  for(let i=0;i<count;i++){
    let opt=document.createElement("option");
    opt.value=i;
    opt.text="Spieler " + (i+1);
    select.appendChild(opt);
  }
}

function startGame(){

  if(mode==="single"){
    players=[
      document.getElementById("p0").value||"Spieler 1",
      document.getElementById("p1").value||"Spieler 2"
    ];
  } else {
    players=[
      document.getElementById("p0").value||"A1",
      document.getElementById("p1").value||"A2",
      document.getElementById("p2").value||"B1",
      document.getElementById("p3").value||"B2"
    ];
  }

  state.server=parseInt(document.getElementById("serverSelect").value);

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  renderButtons();
  render();
}

function getTeamName(team){
  if(mode==="single") return players[team];
  return team===0 ? players[0]+" / "+players[1] : players[2]+" / "+players[3];
}

function renderButtons(){
  document.getElementById("buttons").innerHTML=
    `<button class="teamA" onclick="point(0)">${getTeamName(0)}</button>
     <button class="teamB" onclick="point(1)">${getTeamName(1)}</button>`;
}

function render(){

  document.getElementById("setHistory").innerText =
    setHistory.join(" | ");

  document.getElementById("games").innerText =
    `Spiele: ${state.games[0]} : ${state.games[1]}`;

  document.getElementById("server").innerText =
    "Aufschlag: " + players[state.server % players.length];

  let s=["0","15","30","40"];
  let score="";

  if(state.tiebreak){
    score = `${state.points[0]} : ${state.points[1]} ${(matchTiebreak ? '(Match-TB)' : '(TB)')}`;
  }
  else if(state.points[0]>=3 && state.points[1]>=3){
    if(state.points[0]===state.points[1]) score="Einstand";
    else score = state.points[0]>state.points[1]
      ? "Vorteil " + getTeamName(0)
      : "Vorteil " + getTeamName(1);
  }
  else{
    score=`${s[state.points[0]]} : ${s[state.points[1]]}`;
  }

  document.getElementById("score").innerText=score;
}

function point(t){
  saveHistory();
  state.points[t]++;

  if(state.tiebreak){
    let limit = matchTiebreak ? 10 : 7;

    if(state.points[t]>=limit && state.points[t]-state.points[1-t]>=2){
      winGame(t);
    }
  } else {
    if(state.points[t]>=4 && state.points[t]-state.points[1-t]>=2){
      winGame(t);
    }
  }

  render();
}

function winGame(t){

  if(matchTiebreak){
    setHistory.push(`10:${state.points[1-t]}`);
    alert("🏆 Match gewonnen! " + getTeamName(t));
    reset();
    return;
  }

  // ✅ Tiebreak Satzgewinn 7:6
  if(state.tiebreak && state.games[0]===6 && state.games[1]===6){
    setHistory.push(`7:6`);
    state.sets[t]++;
    state.games=[0,0];
    state.points=[0,0];
    state.tiebreak=false;
    state.server++;

    if(state.sets[0]===1 && state.sets[1]===1){
      matchTiebreak=true;
      state.tiebreak=true;
      return;
    }

    return;
  }

  state.games[t]++;
  state.points=[0,0];
  state.server++;

  if(state.games[t]>=6 && state.games[t]-state.games[1-t]>=2){
    setHistory.push(`${state.games[t]}:${state.games[1-t]}`);
    state.sets[t]++;
    state.games=[0,0];

    if(state.sets[0]===1 && state.sets[1]===1){
      matchTiebreak=true;
      state.tiebreak=true;
    }
  }

  state.tiebreak=(state.games[0]===6 && state.games[1]===6);
}

function undo(){
  if(history.length===0) return;
  restoreState(history.shift());
  render();
}

function reset(){
  location.reload();
}

setMode("single");

</script>

</body>
</html>
