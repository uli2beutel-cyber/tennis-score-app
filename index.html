<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tennis App</title>

<style>

/* RESET */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial;
  color: white;
  text-align: center;
  background: #000;
}

/* STARTSCREEN */
#setup {
  height: 100vh;
  width: 100vw;
  background-image: url('maurits-bausenhart-XtcZbSPVJ3A-unsplash.jpg');
  background-size: cover;
  background-position: center;
  position: relative;
}

#setup::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.25);
}

/* Titel */
.title {
  position: relative;
  z-index: 1;
  margin: 0;
  padding: 30px 10px;
  font-size: 34px;
  font-weight: bold;
  text-shadow: 0 4px 12px rgba(0,0,0,0.9);
}

/* Card */
.card {
  position: relative;
  z-index: 1;
  max-width: 420px;
  margin: 20px auto;

  background: rgba(15, 23, 42, 0.55);
  backdrop-filter: blur(10px);

  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);

  padding: 20px;
  border-radius: 20px;
}

/* Game Screen */
#game {
  min-height: 100vh;
  background: #0f172a;
}

/* ========================= */
/* MODERNE BUTTONS */
/* ========================= */

button {
  height: 65px;
  min-width: 160px;
  max-width: 180px;
  margin: 8px;
  border-radius: 16px;
  border: none;
  color: white;
  font-size: 16px;
  font-weight: bold;
  padding: 10px;

  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-align: center;

  cursor: pointer;
  transition: 0.15s ease;
}

button:active {
  transform: scale(0.95);
}

/* Team Buttons (modern & clean) */
.teamA {
  background: #166534; /* dunkelgrün */
}

.teamB {
  background: #1e3a8a; /* modern blau */
}

/* Aktionen */
.undo {
  background: #b45309;
}

.reset {
  background: #991b1b;
}

/* Start Buttons */
.modeBtn {
  background: #334155;
}

.startBtn {
  background: #2563eb;
}

/* Inputs */
input, select {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  width: 90%;
}

.hidden { display: none; }

</style>
</head>

<body>

<div id="setup">

  <h1 class="title">🎾 Tennis Score</h1>

  <div class="card">

    <button class="modeBtn" onclick="setMode('single')">Einzel</button>
    <button class="modeBtn" onclick="setMode('double')">Doppel</button>

    <div id="playerInputs"></div>

    <h3>Aufschlag</h3>
    <select id="serverSelect"></select>

    <h3>Modus</h3>
    <select id="countMode">
      <option value="normal">Freies Spiel</option>
      <option value="medenspiel">Medenspiel (DTB)</option>
    </select>

    <button class="startBtn" onclick="startGame()">Start</button>

  </div>
</div>

<div id="game" class="hidden">

  <div class="card">
    <h2 id="setHistory"></h2>
    <h2 id="games"></h2>
    <h3 id="server"></h3>
    <h1 id="score"></h1>
  </div>

  <div id="buttons"></div>

  <button class="undo" onclick="undo()">↩️ Rückgängig</button><br>
  <button class="reset" onclick="reset()">Reset</button>

</div>

<script>

let mode="single";
let players=[];
let history=[];
let matchTiebreak=false;
let setHistory=[];

let state={
  points:[0,0],
  games:[0,0],
  sets:[0,0],
  tiebreak:false,
  server:0
};

/* Hilfsfunktionen */
function shortName(name){
  return name.length > 12 ? name.substring(0,10) + "…" : name;
}

function cloneState(){
  return JSON.parse(JSON.stringify({state, matchTiebreak, setHistory}));
}
function restoreState(s){
  state=s.state;
  matchTiebreak=s.matchTiebreak;
  setHistory=s.setHistory;
}
function saveHistory(){
  history.unshift(cloneState());
}

/* Setup */
function setMode(m){
  mode=m;
  let html="";
  if(m==="single"){
    html=`<input id="p0"><input id="p1">`;
  } else {
    html=`<input id="p0"><input id="p1"><input id="p2"><input id="p3">`;
  }
  document.getElementById("playerInputs").innerHTML=html;
  updateServerOptions();
}

function updateServerOptions(){
  let select=document.getElementById("serverSelect");
  select.innerHTML="";
  let count=(mode==="single")?2:4;
  for(let i=0;i<count;i++){
    let opt=document.createElement("option");
    opt.value=i;
    opt.text="Spieler "+(i+1);
    select.appendChild(opt);
  }
}

/* Start */
function startGame(){

  players=[];
  let inputs=document.querySelectorAll("#playerInputs input");
  inputs.forEach((inp,i)=>{
    players.push(inp.value || "Spieler "+(i+1));
  });

  state.server=parseInt(document.getElementById("serverSelect").value);

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  renderButtons();
  render();
}

/* UI */
function getTeamName(team){
  if(mode==="single") return shortName(players[team]);
  return shortName(players[team*2]) + " / " + shortName(players[team*2+1]);
}

function renderButtons(){
  document.getElementById("buttons").innerHTML =
  `<button class="teamA" onclick="point(0)">${getTeamName(0)}</button>
   <button class="teamB" onclick="point(1)">${getTeamName(1)}</button>`;
}

function render(){

  document.getElementById("setHistory").innerText = setHistory.join(" | ");
  document.getElementById("games").innerText = `Spiele: ${state.games[0]} : ${state.games[1]}`;
  document.getElementById("server").innerText = "Aufschlag: " + players[state.server % players.length];

  let s=["0","15","30","40"];
  let score="";

  if(state.tiebreak){
    score=`${state.points[0]} : ${state.points[1]} ${(matchTiebreak?'(Match-TB)':'(TB)')}`;
  }
  else if(state.points[0]>=3 && state.points[1]>=3){
    if(state.points[0]===state.points[1]) score="Einstand";
    else score=state.points[0]>state.points[1]?"Vorteil ":"Vorteil ";
  }
  else{
    score=`${s[state.points[0]]} : ${s[state.points[1]]}`;
  }

  document.getElementById("score").innerText=score;
}

/* Score Logik */
function point(t){
  saveHistory();
  state.points[t]++;

  if(state.tiebreak){
    let limit = matchTiebreak ? 10 : 7;
    if(state.points[t]>=limit && state.points[t]-state.points[1-t]>=2){
      winGame(t);
    }
  } else {
    if(state.points[t]>=4 && state.points[t]-state.points[1-t]>=2){
      winGame(t);
    }
  }

  render();
}

function winGame(t){

  if(matchTiebreak){
    setHistory.push(`10:${state.points[1-t]}`);
    alert("🏆 Match gewonnen!");
    reset();
    return;
  }

  if(state.tiebreak && state.games[0]===6){
    setHistory.push("7:6");
    state.games=[0,0];
    state.tiebreak=false;
    if(setHistory.length===2){
      matchTiebreak=true;
      state.tiebreak=true;
    }
    return;
  }

  state.games[t]++;
  state.points=[0,0];
  state.server++;

  if(state.games[t]>=6 && state.games[t]-state.games[1-t]>=2){
    setHistory.push(`${state.games[t]}:${state.games[1-t]}`);
    state.games=[0,0];

    if(setHistory.length===2){
      matchTiebreak=true;
      state.tiebreak=true;
    }
  }

  state.tiebreak=(state.games[0]===6 && state.games[1]===6);
}

function undo(){
  if(history.length===0) return;
  restoreState(history.shift());
  render();
}

function reset(){
  location.reload();
}

setMode("single");

</script>

</body>
</html>
``
